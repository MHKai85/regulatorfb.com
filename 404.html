<script>
// GitHub Pages SPA trick: catch /s/{id} paths and redirect to /s/?id={slug}
(function () {
  var path = window.location.pathname;
  var match = path.match(/^\/s\/(.+)$/);
  if (match) {
    window.location.replace('/s/?id=' + match[1]);
  }
}());
</script>
