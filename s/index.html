<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redirecting — Regulator · FB</title>
<style>
  body { background: #1a365d; color: #fff; font-family: -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
  .loading { text-align: center; }
  .loading p { color: rgba(255,255,255,0.6); }
  a { color: #c05621; }
</style>
</head>
<body>
<div class="loading" id="msg">
  <p>Redirecting...</p>
</div>
<script>
// GitHub Pages 404 trick: 404.html redirects to /s/?id={slug}
// Or direct access: /s/?id={slug}
var params = new URLSearchParams(window.location.search);
var id = params.get('id');
if (id) {
  fetch('/s/links.json')
    .then(function(r) { return r.json(); })
    .then(function(links) {
      if (links[id]) {
        window.location.replace(links[id]);
      } else {
        document.getElementById('msg').innerHTML = '<p>Link not found.</p><p><a href="https://regulatorfb.com">Regulator · FB</a></p>';
      }
    })
    .catch(function() {
      document.getElementById('msg').innerHTML = '<p>Error loading link.</p><p><a href="https://regulatorfb.com">Regulator · FB</a></p>';
    });
} else {
  window.location.replace('https://regulatorfb.com');
}
</script>
</body>
</html>
